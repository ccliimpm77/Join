name: Fix EPG for Televizo

on:
  schedule:
    - cron: '30 6 * * *'  # 08:30 Italy (UTC+2 summer / UTC+1 winter handled manually)
  workflow_dispatch:

jobs:
  fix-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download EPG
        run: |
          curl -L "https://raw.githubusercontent.com/ccliimpm77/Join/refs/heads/main/join.epg" -o join.epg

      - name: Fix EPG (Python)
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta
          import re

          file_path = "join.epg"

          tree = ET.parse(file_path)
          root = tree.getroot()

          # --- FIX CHANNEL IDS ---
          def clean_id(s):
              s = s.strip().lower()
              s = re.sub(r"\s+", "", s)
              s = re.sub(r"[^a-z0-9\.\-]", "", s)
              return s

          id_map = {}

          for ch in root.findall("channel"):
              old_id = ch.get("id")
              new_id = clean_id(old_id)
              id_map[old_id] = new_id
              ch.set("id", new_id)

          # --- FIX PROGRAMME CHANNEL REFERENCES ---
          for prog in root.findall("programme"):
              ch = prog.get("channel")
              if ch in id_map:
                  prog.set("channel", id_map[ch])

          # --- FIX TIMEZONE TO UTC ---
          def to_utc(timestr):
              try:
                  dt = datetime.strptime(timestr[:14], "%Y%m%d%H%M%S")
                  offset = timestr[15:20]
                  sign = 1 if offset[0] == '+' else -1
                  hours = int(offset[1:3])
                  minutes = int(offset[3:5])
                  delta = timedelta(hours=hours, minutes=minutes)
                  dt_utc = dt - sign * delta
                  return dt_utc.strftime("%Y%m%d%H%M%S +0000")
              except:
                  return timestr

          for prog in root.findall("programme"):
              prog.set("start", to_utc(prog.get("start")))
              prog.set("stop", to_utc(prog.get("stop")))

          # --- FIX TRUNCATED DESCRIPTIONS ---
          for desc in root.findall(".//desc"):
              if desc.text and desc.text.strip().endswith("banch"):
                  desc.text = desc.text + "e"

          # --- REMOVE DUPLICATE DISPLAY-NAME ---
          for ch in root.findall("channel"):
              names = ch.findall("display-name")
              seen = set()
              for n in names:
                  if n.text in seen:
                      ch.remove(n)
                  else:
                      seen.add(n.text)

          tree.write("join_fixed.epg", encoding="utf-8", xml_declaration=True)
          EOF

      - name: Replace original file
        run: |
          mv join_fixed.epg join.epg

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add join.epg
          git commit -m "Auto-fix EPG for Televizo" || echo "No changes"
          git push
