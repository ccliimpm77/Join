name: Update Daily EPG

on:
  schedule:
    # Gira ogni giorno alle 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests
          pip install deep-translator

      - name: Run merge script
        run: python merge_epg.py

      - name: Verifica creazione file
        run: |
          if [ -f "join.epg" ]; then
            echo "Il file join.epg esiste ed è pronto."
            ls -lh join.epg
          else
            echo "Errore: Il file join.epg non è stato creato."
            exit 1
          fi
          if [ -f "channel.txt" ]; then
            echo "Il file channel.txt esiste ed è pronto."
            ls -lh channel.txt
          fi

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update EPG e Channel List automatico"
          # Aggiunto channel.txt al pattern dei file da salvare
          file_pattern: 'join.epg channel.txt'
