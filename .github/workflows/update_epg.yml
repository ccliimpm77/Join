name: Update Daily EPG

on:
  schedule:
    # 1. MODIFICA: Esegue il workflow ogni 6 ore (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run merge script
        run: python merge_epg.py

      # 2. NUOVO STEP: Inserisce forzatamente il tag di refresh nel file join.epg
      - name: Aggiungi tag refresh 6 ore nel file XML
        run: |
          if [ -f "join.epg" ]; then
            # Questo comando cerca il tag <tv ...> e aggiunge i parametri generator e refresh
            sed -i 's/<tv[^>]*>/<tv generator-info-name="MyMerge" refresh="360">/' join.epg
            echo "Tag di refresh aggiornato a 360 minuti."
          else
            echo "File join.epg non trovato, impossibile aggiungere il tag."
          fi

      - name: Verificata creazione file
        run: |
          if [ -f "join.epg" ]; then
            echo "Il file join.epg esiste ed è pronto."
            ls -lh join.epg
          else
            echo "Errore: Il file join.epg non è stato creato dallo script Python."
            exit 1
          fi

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update EPG (Frequenza 6h e tag refresh)"
          file_pattern: 'join.epg'
