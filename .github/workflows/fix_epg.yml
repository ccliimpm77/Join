name: Fix & Publish EPG

on:
  schedule:
    # Ogni giorno alle 04:00 UTC (6:00 CET) — aggiorna l'EPG fresco
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Permette di lanciarlo manualmente dalla UI di GitHub
    inputs:
      timezone:
        description: 'Timezone target (es. +0100 o +0000)'
        required: false
        default: '+0100'
      dry_run:
        description: 'Dry run (true = non commita)'
        required: false
        default: 'false'

jobs:
  fix-epg:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessario per il commit automatico

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fix_epg.py
        run: |
          TIMEZONE="${{ github.event.inputs.timezone || '+0100' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--timezone $TIMEZONE --output join.epg"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python3 fix_epg.py $ARGS

      - name: Verifica XML output
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('join.epg')
          root = tree.getroot()
          ch = len(root.findall('channel'))
          pr = len(root.findall('programme'))
          print(f'Verifica OK — Canali: {ch}, Programmi: {pr}')
          "

      - name: Commit e push join.epg corretto
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add join.epg

          # Commita solo se ci sono modifiche
          if git diff --cached --quiet; then
            echo "Nessuna modifica al file EPG, skip commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: aggiorna e corregge join.epg [$TIMESTAMP]"
            git push
          fi
