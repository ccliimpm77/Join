name: Esecuzione Script Giornalieri

on:
  schedule:
    # Pianificato per ogni giorno alle 06:00 UTC (07:00 o 08:00 ora italiana)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permette l'esecuzione manuale per test

jobs:
  execute-scripts:
    runs-on: ubuntu-latest
    # Permessi necessari per permettere all'automazione di fare il commit delle modifiche
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Esegui gli script elencati in s_script.txt
        run: |
          # Verifica se il file esiste prima di provare a leggerlo
          if [ ! -f s_script.txt ]; then
            echo "Errore: s_script.txt non trovato!"
            exit 1
          fi

          # Legge il file riga per riga ed esegue i comandi
          while IFS= read -r line || [ -n "$line" ]; do
            # Ignora righe vuote o commenti che iniziano con #
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            
            echo "------------------------------------------"
            echo "Eseguendo: $line"
            echo "------------------------------------------"
            
            # Esegue il comando (es. python s_delete.py)
            eval "$line"
            
          done < s_script.txt

      - name: Salva e pubblica le modifiche (Commit & Push)
        run: |
          # Configura l'utente Git per il commit
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Aggiunge i file modificati (come join.old o l'eliminazione di epg.old)
          git add .
          
          # Esegue il commit solo se ci sono effettive modifiche, altrimenti non fa nulla
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automazione: aggiornamento file eseguito tramite s_script.txt" && git push)
