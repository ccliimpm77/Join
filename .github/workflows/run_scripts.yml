name: Esecuzione Script Giornalieri

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  execute-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Esegui gli script elencati in s_script.txt
        run: |
          if [ ! -f s_script.txt ]; then
            echo "Errore: s_script.txt non trovato!"
            exit 1
          fi

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            echo "------------------------------------------"
            echo "Eseguendo: $line"
            echo "------------------------------------------"
            eval "$line"
          done < s_script.txt

      - name: Salva e pubblica le modifiche (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automazione: aggiornamento file EPG" && git push)
